spring.application.name=backend

# Docker Local DB
spring.datasource.url=JDBC_CONNECTION_STRING
spring.datasource.username=DB_USERNAME
spring.datasource.password=DB_PASSWORD

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate validates schema only, Flyway manages all changes
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true

# Flyway manages schema - baseline represents current V1 schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Initial schema from V1__init_schema.sql

# Jwt
app.jwt.secret=JWT_SECRET
# 24 Hours in milliseconds
app.jwt.expiration=86400000